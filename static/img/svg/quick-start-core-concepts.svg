<svg width="1280" height="600" viewBox="0 0 1280 600" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Rainbond 核心概念速览</title>
  <desc id="desc">展示企业团队、应用、组件、网关、应用模版和应用市场之间关系的简要流程图。</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="72" x2="1160" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#F6F8FC"/>
    </linearGradient>
    <linearGradient id="team" x1="0" y1="0" x2="240" y2="126" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="app" x1="0" y1="0" x2="270" y2="138" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="component" x1="0" y1="0" x2="300" y2="138" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="gateway" x1="0" y1="0" x2="240" y2="122" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EA580C"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="template" x1="0" y1="0" x2="250" y2="122" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B45309"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="market" x1="0" y1="0" x2="300" y2="122" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="shadow" x="-20" y="-20" width="1320" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1 1.2L6.5 4L1 6.8" stroke="#94A3B8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="40" y="40" width="1200" height="520" rx="28" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="90" y="206" width="240" height="126" rx="24" fill="url(#team)"/>
    <rect x="420" y="200" width="270" height="138" rx="28" fill="url(#app)"/>
    <rect x="780" y="200" width="300" height="138" rx="28" fill="url(#component)"/>

    <rect x="435" y="50" width="240" height="122" rx="24" fill="url(#gateway)"/>
    <rect x="430" y="366" width="250" height="122" rx="24" fill="url(#template)"/>
    <rect x="780" y="366" width="300" height="122" rx="24" fill="url(#market)"/>
  </g>

  <path d="M338 269H408" stroke="#94A3B8" stroke-width="3.2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M698 269H768" stroke="#94A3B8" stroke-width="3.2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M555 196V176" stroke="#94A3B8" stroke-width="3.2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M555 342V362" stroke="#94A3B8" stroke-width="3.2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M688 427H774" stroke="#94A3B8" stroke-width="3.2" stroke-linecap="round" marker-end="url(#arrow)"/>

  <text x="210" y="274" fill="#FFFFFF" font-size="34" font-weight="700" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="middle">企业 / 团队</text>
  <text x="210" y="310" fill="#DBEAFE" font-size="16" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="middle">协作与资源隔离空间</text>

  <text x="555" y="274" fill="#FFFFFF" font-size="34" font-weight="700" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="middle">应用</text>
  <text x="555" y="310" fill="#D1FAE5" font-size="16" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="middle">一个完整业务系统</text>

  <text x="930" y="274" fill="#FFFFFF" font-size="34" font-weight="700" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="middle">组件</text>
  <text x="930" y="310" fill="#EDE9FE" font-size="16" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="middle">前端、API、数据库等运行单元</text>

  <text x="555" y="126" fill="#FFFFFF" font-size="34" font-weight="700" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="middle">网关</text>
  <text x="555" y="162" fill="#FFEDD5" font-size="16" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="middle">对外暴露应用访问入口</text>

  <text x="555" y="428" fill="#FFFFFF" font-size="34" font-weight="700" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="middle">应用模版</text>
  <text x="555" y="464" fill="#FEF3C7" font-size="16" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="middle">可安装、可升级的应用模版</text>

  <text x="930" y="428" fill="#FFFFFF" font-size="34" font-weight="700" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="middle">应用市场</text>
  <text x="930" y="464" fill="#DCFCE7" font-size="15" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="middle">安装与分发应用模版</text>

  <text x="140" y="520" fill="#475569" font-size="20" font-weight="600" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif">先把它记成一句话：</text>
  <text x="640" y="522" fill="#0F172A" font-size="20" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="middle">
    <tspan x="640" dy="0">在团队里管理应用，把应用拆成组件；应用可以对接网关暴露访问入口。</tspan>
    <tspan x="640" dy="28">需要复用与交付时，就沉淀为应用模版，再进入应用市场。</tspan>
  </text>
</svg>
