<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef8f5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#9fb6c8" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg1)"/>
  <text x="80" y="92" font-size="34" font-weight="700" fill="#16324f" font-family="Arial, Helvetica, sans-serif">Rainbond 试点路径图</text>
  <text x="80" y="132" font-size="18" fill="#4b6478" font-family="Arial, Helvetica, sans-serif">目标不是一次性替换全部系统，而是先让第一个真实应用顺利进入可交付状态。</text>

  <g filter="url(#shadow)">
    <rect x="80" y="210" rx="24" ry="24" width="230" height="128" fill="#ffffff"/>
    <rect x="350" y="210" rx="24" ry="24" width="230" height="128" fill="#ffffff"/>
    <rect x="620" y="210" rx="24" ry="24" width="230" height="128" fill="#ffffff"/>
    <rect x="890" y="210" rx="24" ry="24" width="230" height="128" fill="#ffffff"/>
  </g>

  <rect x="80" y="210" rx="24" ry="24" width="230" height="128" fill="none" stroke="#4db38a" stroke-width="2"/>
  <rect x="350" y="210" rx="24" ry="24" width="230" height="128" fill="none" stroke="#3d8bfd" stroke-width="2"/>
  <rect x="620" y="210" rx="24" ry="24" width="230" height="128" fill="none" stroke="#42b0b8" stroke-width="2"/>
  <rect x="890" y="210" rx="24" ry="24" width="230" height="128" fill="none" stroke="#2f6fb5" stroke-width="2"/>

  <text x="112" y="252" font-size="18" font-weight="700" fill="#1b3d2f" font-family="Arial, Helvetica, sans-serif">1. 找真实试点应用</text>
  <text x="112" y="286" font-size="15" fill="#526474" font-family="Arial, Helvetica, sans-serif">选真实、可持续迭代、</text>
  <text x="112" y="308" font-size="15" fill="#526474" font-family="Arial, Helvetica, sans-serif">但风险可控的业务应用</text>

  <text x="382" y="252" font-size="18" font-weight="700" fill="#183861" font-family="Arial, Helvetica, sans-serif">2. 跑通首次部署</text>
  <text x="382" y="286" font-size="15" fill="#526474" font-family="Arial, Helvetica, sans-serif">围绕应用交付完成</text>
  <text x="382" y="308" font-size="15" fill="#526474" font-family="Arial, Helvetica, sans-serif">部署、运行、回滚验证</text>

  <text x="652" y="252" font-size="18" font-weight="700" fill="#17474a" font-family="Arial, Helvetica, sans-serif">3. 看 3 个核心指标</text>
  <text x="652" y="286" font-size="15" fill="#526474" font-family="Arial, Helvetica, sans-serif">上手速度、交付路径、</text>
  <text x="652" y="308" font-size="15" fill="#526474" font-family="Arial, Helvetica, sans-serif">协作效率是否改善</text>

  <text x="922" y="252" font-size="18" font-weight="700" fill="#17385e" font-family="Arial, Helvetica, sans-serif">4. 决定是否放大</text>
  <text x="922" y="286" font-size="15" fill="#526474" font-family="Arial, Helvetica, sans-serif">先小范围复制，</text>
  <text x="922" y="308" font-size="15" fill="#526474" font-family="Arial, Helvetica, sans-serif">再决定扩大范围</text>

  <path d="M310 274 H350" stroke="#9ab3c8" stroke-width="4" stroke-linecap="round"/>
  <polygon points="343,267 358,274 343,281" fill="#9ab3c8"/>
  <path d="M580 274 H620" stroke="#9ab3c8" stroke-width="4" stroke-linecap="round"/>
  <polygon points="613,267 628,274 613,281" fill="#9ab3c8"/>
  <path d="M850 274 H890" stroke="#9ab3c8" stroke-width="4" stroke-linecap="round"/>
  <polygon points="883,267 898,274 883,281" fill="#9ab3c8"/>

  <rect x="80" y="430" rx="20" ry="20" width="1040" height="164" fill="#ffffff" stroke="#d9e6ef" stroke-width="2"/>
  <text x="112" y="474" font-size="22" font-weight="700" fill="#16324f" font-family="Arial, Helvetica, sans-serif">试点成功的判断标准</text>
  <text x="112" y="516" font-size="17" fill="#35506a" font-family="Arial, Helvetica, sans-serif">• 新人是不是更快能参与交付</text>
  <text x="112" y="548" font-size="17" fill="#35506a" font-family="Arial, Helvetica, sans-serif">• 部署和回滚路径是不是比原来更短、更清晰</text>
  <text x="112" y="580" font-size="17" fill="#35506a" font-family="Arial, Helvetica, sans-serif">• 团队讨论是否开始从基础设施细节转向应用交付结果</text>
</svg>
