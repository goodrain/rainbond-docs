<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef8f5"/>
    </linearGradient>
    <filter id="shadowA" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#9db6c9" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bgA)"/>
  <text x="72" y="88" font-size="34" font-weight="700" fill="#16324f" font-family="Arial, Helvetica, sans-serif">云原生平台怎么选：先看团队阶段和路径</text>
  <text x="72" y="126" font-size="18" fill="#4b6478" font-family="Arial, Helvetica, sans-serif">与其先比功能表，不如先看你最想解决的是“更容易开始”还是“更强治理”。</text>

  <g filter="url(#shadowA)">
    <rect x="390" y="158" rx="28" ry="28" width="500" height="132" fill="#ffffff" stroke="#3d8bfd" stroke-width="2"/>
    <rect x="40" y="398" rx="28" ry="28" width="270" height="190" fill="#ffffff" stroke="#4db38a" stroke-width="2"/>
    <rect x="350" y="398" rx="28" ry="28" width="270" height="190" fill="#ffffff" stroke="#2fb79d" stroke-width="2"/>
    <rect x="660" y="398" rx="28" ry="28" width="270" height="190" fill="#ffffff" stroke="#42b0b8" stroke-width="2"/>
    <rect x="970" y="398" rx="28" ry="28" width="270" height="190" fill="#ffffff" stroke="#f08b36" stroke-width="2"/>
  </g>

  <text x="462" y="210" font-size="22" font-weight="700" fill="#16324f" font-family="Arial, Helvetica, sans-serif">你的团队当前最需要的是什么？</text>
  <text x="420" y="244" font-size="18" fill="#4b6478" font-family="Arial, Helvetica, sans-serif">更容易开始、更顺的云上体验，还是更强的平台治理能力？</text>

  <path d="M500 290 L175 398" stroke="#9ab3c8" stroke-width="4" fill="none"/>
  <path d="M590 290 L485 398" stroke="#9ab3c8" stroke-width="4" fill="none"/>
  <path d="M690 290 L795 398" stroke="#9ab3c8" stroke-width="4" fill="none"/>
  <path d="M780 290 L1105 398" stroke="#9ab3c8" stroke-width="4" fill="none"/>

  <text x="92" y="444" font-size="24" font-weight="700" fill="#1b3d2f" font-family="Arial, Helvetica, sans-serif">优先看 Rainbond</text>
  <text x="72" y="484" font-size="16" fill="#536575" font-family="Arial, Helvetica, sans-serif">• 想先把应用跑起来</text>
  <text x="72" y="514" font-size="16" fill="#536575" font-family="Arial, Helvetica, sans-serif">• 不想先学完整套 K8s</text>
  <text x="72" y="544" font-size="16" fill="#536575" font-family="Arial, Helvetica, sans-serif">• 更适合试点、私有化、信创</text>

  <text x="403" y="444" font-size="24" font-weight="700" fill="#14695f" font-family="Arial, Helvetica, sans-serif">优先看 Sealos</text>
  <text x="382" y="484" font-size="16" fill="#536575" font-family="Arial, Helvetica, sans-serif">• 更看重云上开发体验</text>
  <text x="382" y="514" font-size="16" fill="#536575" font-family="Arial, Helvetica, sans-serif">• 偏快速部署与 AI-native 场景</text>
  <text x="382" y="544" font-size="16" fill="#536575" font-family="Arial, Helvetica, sans-serif">• 更像开发者云平台</text>

  <text x="701" y="444" font-size="22" font-weight="700" fill="#17474a" font-family="Arial, Helvetica, sans-serif">优先看 KubeSphere</text>
  <text x="690" y="484" font-size="16" fill="#536575" font-family="Arial, Helvetica, sans-serif">• 希望平台能力更完整</text>
  <text x="690" y="514" font-size="16" fill="#536575" font-family="Arial, Helvetica, sans-serif">• 能接受更高平台复杂度</text>
  <text x="690" y="544" font-size="16" fill="#536575" font-family="Arial, Helvetica, sans-serif">• 更适合中大型团队建设平台</text>

  <text x="1002" y="444" font-size="24" font-weight="700" fill="#7a4a19" font-family="Arial, Helvetica, sans-serif">优先看 Rancher</text>
  <text x="993" y="484" font-size="16" fill="#536575" font-family="Arial, Helvetica, sans-serif">• 已具备成熟 K8s 能力</text>
  <text x="993" y="514" font-size="16" fill="#536575" font-family="Arial, Helvetica, sans-serif">• 更关注多集群治理与控制面</text>
  <text x="993" y="544" font-size="16" fill="#536575" font-family="Arial, Helvetica, sans-serif">• 适合复杂企业级环境</text>
</svg>
